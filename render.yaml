services:
  - type: web
    name: pitchforge-ai-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: DATABASE_NAME
        value: pitchforge
      - key: FRONTEND_URLS
        sync: false
      - key: ALLOWED_HOSTS
        value: localhost,127.0.0.1,0.0.0.0,*.onrender.com,*.railway.app
